<!-- SPONSORED TEMPLATE VARIANT 1 - BLUE -->
<tr>
  <td style="padding:30px 40px 30px;background-color:#0a67b1;">
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <!-- LEFT COLUMN: Headline + Source -->
        <td width="65%" valign="top">
          <span style="display:block; margin:0 0 10px;font-size:20px;font-weight:600;color:#FFD53D;">SPONSORED</span>
          <a href="#" style="display:block;margin:0 0 8px;font-size:30px;font-weight:600;line-height:1.2;color:#ffffff;text-decoration:none;">
            {{ARTICLE_TITLE}}
          </a>
          <p style="margin:10px 0 8px;font-size:20px;font-weight:300;line-height:1.2;color:#ffffff;">
            {{ARTICLE_SUMMARY}}
          </p>
        </td>

        <!-- RIGHT COLUMN: Image -->
        <td width="35%" valign="center" style="text-align:right;">
          <img src="{{ARTICLE_IMAGE_URL}}" alt="" style="display:block;width:100%;border-radius:12px;">
        </td>
      </tr>
    </table>
  </td>
</tr>
